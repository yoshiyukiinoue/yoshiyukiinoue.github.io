# SciX (ADS) 公開ライブラリから論文リストを定期更新する
# 必要な設定: リポジトリの Settings → Secrets and variables → Actions に
#             ADS_DEV_KEY (SciX API トークン) を登録すること
name: Update publications from SciX

on:
  schedule:
    - cron: '0 21 * * 0'   # 毎週月曜 6:00 JST (日曜 21:00 UTC)
  workflow_dispatch:        # 手動実行も可能

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build publications from SciX (ADS)
        env:
          ADS_DEV_KEY: ${{ secrets.ADS_DEV_KEY }}
        run: python3 scripts/build_publications.py
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/ja/publication/index.md content/en/publication/index.md \
                  content/ja/_index.md content/en/_index.md
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "content: update publications from SciX"
            git push
          fi
